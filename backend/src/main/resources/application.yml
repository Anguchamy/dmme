spring:
  application:
    name: dmme-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0

server:
  port: ${PORT:8080}
  error:
    include-message: always

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
  supabase:
    # HS256 JWT secret from Supabase project settings (API > JWT Secret)
    jwt-secret: ${SUPABASE_JWT_SECRET:changeme-supabase-jwt-secret}
    project-url: ${SUPABASE_URL:https://your-project.supabase.co}
  instagram:
    app-id: ${INSTAGRAM_APP_ID:${META_APP_ID:}}
    app-secret: ${INSTAGRAM_APP_SECRET:${META_APP_SECRET:}}
    verify-token: ${META_WEBHOOK_VERIFY_TOKEN:dmme-verify}
    graph-base-url: ${META_GRAPH_BASE_URL:https://graph.facebook.com/v21.0}
    redirect-uri: ${INSTAGRAM_REDIRECT_URI:http://localhost:5173/instagram/callback}
    scopes: ${INSTAGRAM_SCOPES:instagram_business_basic,instagram_business_manage_messages,instagram_business_manage_comments}
    ig-graph-base-url: ${INSTAGRAM_GRAPH_BASE_URL:https://graph.instagram.com}
  razorpay:
    key-id: ${RAZORPAY_KEY_ID:}
    key-secret: ${RAZORPAY_KEY_SECRET:}
    webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}

logging:
  level:
    com.dmme: DEBUG
